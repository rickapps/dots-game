{% block body %}
<fieldset id="scoreBoard">
    <legend>Scores:</legend>
    <div class="score-row" id="row1">
        <img class="indicator invisible" src='/static/img/indicator.svg' alt="=>">
        <div class="player-color claim1"></div>
        <span class="player-name" id="name1"></span>
        <span class="player-score" id="score1"></span>
    </div>
    <div class="score-row" id="row2">
        <img class="indicator invisible" src='/static/img/indicator.svg' alt="=>">
        <div class="player-color claim2"></div>
        <span class="player-name" id="name2"></span>
        <span class="player-score" id="score2"></span>
    </div>
    <div class="score-row" id="row3">
        <img class="indicator invisible" src='/static/img/indicator.svg' alt="=>">
        <div class="player-color claim3"></div>
        <span class="player-name" id="name3"></span>
        <span class="player-score" id="score3"></span>
    </div>
    <div class="score-row" id="row4">
        <img class="indicator invisible" src='/static/img/indicator.svg' alt="=>">
        <div class="player-color claim4"></div>
        <span class="player-name" id="name4"></span>
        <span class="player-score" id="score4"></span>
    </div>
    <span id="level"></span>
</fieldset>
<form action="/new/" method="POST" id="restartGame">
    <fieldset>
        <input type="hidden" id="glevel" name="glevel" value="{{size|tojson}}">
        <input type="submit" value="Restart Game">
    </fieldset>
</form>
{% endblock %}
